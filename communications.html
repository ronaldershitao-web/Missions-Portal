<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Communication Centre</title>


<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="./js/config.js"></script>
<script src="./js/auth.js"></script>


<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f8;
}


.header{

background:#1e3a8a;
color:white;

padding:20px;

display:flex;
justify-content:space-between;
align-items:center;

}


.container{

padding:25px;

}


.card{

background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;

}


button{

padding:10px 15px;

border:none;
border-radius:6px;

background:#1e3a8a;
color:white;

cursor:pointer;

margin:3px;

}


button:hover{

background:#163172;

}


input,
textarea,
select{

width:100%;

padding:10px;

border-radius:6px;

border:1px solid #ccc;

margin-top:5px;

box-sizing:border-box;

}


label{

font-weight:bold;

display:block;

margin-top:12px;

}


.eventCard{

padding:15px;

background:#eef2ff;

border-radius:8px;

margin-top:10px;

}



.badge{

background:#dbeafe;

color:#1e3a8a;

padding:5px 10px;

border-radius:15px;

}



.whatsapp{

background:#16a34a;

}


.preview{

background:#64748b;

}



table{

width:100%;

border-collapse:collapse;

margin-top:15px;

}



th{

background:#eef2ff;

}



td,th{

border:1px solid #ddd;

padding:10px;

}



</style>


</head>


<body>


<div class="header">


<h2>
📢 Communication Centre
</h2>


<button onclick="goBack()">
Back
</button>


</div>



<div class="container">



<div class="card">


<h3>
Active Reminder Events
</h3>


<div id="eventList">
Loading...
</div>


</div>





<div class="card">


<h3>
Select Event
</h3>


<select id="eventFilter"
onchange="selectEvent()">



<option value="">
Select Event
</option>


</select>


</div>






<div class="card"
id="reminderConfigCard"
style="display:none;">


<h3>
Prepare Reminder
</h3>



<label>
Reporting Time
</label>

<input id="reportingTime"
placeholder="7:00 PM">



<label>
Event Time
</label>

<input id="eventTime"
placeholder="7:30 PM">



<label>
Venue
</label>

<input id="venue"
placeholder="Main Hall">



<label>
Location
</label>

<input id="location"
placeholder="Church Address">



<label>
Important Information
</label>


<textarea id="importantInfo"
rows="4"
placeholder="Bring passport, arrive early etc."></textarea>



<button onclick="saveReminderConfig()">

Save Reminder Details

</button>



</div>






<div class="card">


<h3>
Participants Requiring Reminder
</h3>


<div id="count">
0 people
</div>



<button onclick="sendSelectedWhatsApp()">

Send Selected WhatsApp

</button>



<table>


<thead>

<tr>

<th>
Select
</th>

<th>
Name
</th>

<th>
Mobile
</th>

<th>
Reminder
</th>

<th>
Action
</th>

</tr>


</thead>



<tbody id="participantTable">

</tbody>


</table>


</div>



</div>

<script>


let reminderEvents = [];

let participants = [];

let reminderConfig = {};





// =====================================
// URL PARAMETERS
// =====================================

const params =
new URLSearchParams(
window.location.search
);


const presetEvent =
params.get("event");







// =====================================
// APPS SCRIPT EXECUTION API
// =====================================


async function apiCall(functionName, parameters=[]){


const response = await fetch(

`https://script.googleapis.com/v1/scripts/${CONFIG.SCRIPT_ID}:run`,

{

method:"POST",

headers:{

"Content-Type":"application/json",

"Authorization":
"Bearer " + await getAccessToken()

},


body:JSON.stringify({

function:functionName,

parameters:parameters,

devMode:false

})


}

);



const result =
await response.json();


console.log(
functionName,
result
);



if(result.error){

throw new Error(

result.error.details?.[0]?.errorMessage
||
result.error.message

);

}



return result.response.result;


}







// =====================================
// LOAD EVENTS
// =====================================


async function loadReminderEvents(){


try{


const result =

await apiCall(

"getActiveEventsForReminder",

[]

);



reminderEvents =
result || [];



renderEvents();

populateEventDropdown();



}

catch(err){


console.error(err);


document.getElementById(
"eventList"
).innerHTML =
"Unable to load events";


}



}









// =====================================
// DISPLAY EVENTS
// =====================================


function renderEvents(){



const div =
document.getElementById(
"eventList"
);



div.innerHTML="";



if(reminderEvents.length===0){


div.innerHTML =
"No active reminder events";


return;


}




reminderEvents.forEach(e=>{


div.innerHTML +=


`

<div class="eventCard">


<b>
${e.eventName}
</b>


<br>


Date:
${e.eventDate}


<br>


Reminder:
<span class="badge">

${e.reminderType}

</span>


</div>

`;



});



}








// =====================================
// EVENT DROPDOWN
// =====================================


function populateEventDropdown(){


const select =
document.getElementById(
"eventFilter"
);



select.innerHTML =

`

<option value="">
Select Event
</option>

`;




reminderEvents.forEach(e=>{


select.innerHTML +=


`

<option value="${e.spreadsheetId}">

${e.eventName}
-
${e.reminderType}

</option>

`;



});





if(presetEvent){


select.value =
presetEvent;


selectEvent();


}



}









// =====================================
// SELECT EVENT
// =====================================


async function selectEvent(){



const eventId =

document.getElementById(
"eventFilter"
).value;




if(!eventId)
return;



const event =

reminderEvents.find(e=>

String(e.spreadsheetId)
===
String(eventId)

);



reminderConfig={


spreadsheetId:
event.spreadsheetId,


eventName:
event.eventName,


eventDate:
event.eventDate,


reminderType:
event.reminderType


};





document.getElementById(
"reminderConfigCard"
).style.display =
"block";





// Load existing configuration

try{


const saved =

await apiCall(

"getReminderConfiguration",

[

{

spreadsheetId:eventId,

reminderType:event.reminderType

}

]

);



if(saved){


document.getElementById(
"reportingTime"
).value =
saved.reportingTime || "";


document.getElementById(
"eventTime"
).value =
saved.eventTime || "";


document.getElementById(
"venue"
).value =
saved.venue || "";


document.getElementById(
"location"
).value =
saved.location || "";


document.getElementById(
"importantInfo"
).value =
saved.importantInfo || "";


}



}

catch(err){

console.log(
"No previous reminder configuration"
);

}



}









// =====================================
// SAVE REMINDER CONFIGURATION
// =====================================


async function saveReminderConfig(){



reminderConfig.reportingTime =

document.getElementById(
"reportingTime"
).value;



reminderConfig.eventTime =

document.getElementById(
"eventTime"
).value;



reminderConfig.venue =

document.getElementById(
"venue"
).value;



reminderConfig.location =

document.getElementById(
"location"
).value;



reminderConfig.importantInfo =

document.getElementById(
"importantInfo"
).value;






await apiCall(

"saveReminderConfiguration",

[reminderConfig]

);



alert(
"Reminder configuration saved"
);



loadParticipants();



}









// =====================================
// LOAD PARTICIPANTS
// =====================================


async function loadParticipants(){



if(!reminderConfig.spreadsheetId)
return;



try{


const result =

await apiCall(

"getReminderParticipants",

[

{


spreadsheetId:

reminderConfig.spreadsheetId,


reminderType:

reminderConfig.reminderType


}


]

);



participants =
result || [];



renderParticipants();


}

catch(err){


console.error(err);


alert(
"Unable to load participants"
);


}



}








// =====================================
// TABLE DISPLAY
// =====================================


function renderParticipants(){


const table =
document.getElementById(
"participantTable"
);



table.innerHTML="";



document.getElementById(
"count"
).innerHTML =

participants.length
+
" people";





participants.forEach((p,index)=>{


table.innerHTML +=


`

<tr>


<td>


<input

type="checkbox"

class="personCheck"

value="${index}">


</td>



<td>

${p.name}

</td>



<td>

${p.mobile}

</td>



<td>


<span class="badge">

${reminderConfig.reminderType}

</span>


</td>



<td>


<button

class="preview"

onclick="previewMessage(${index})">

Preview

</button>



<button

class="whatsapp"

onclick="sendWhatsApp(${index})">

WhatsApp

</button>


</td>


</tr>


`;



});



}








// =====================================
// MESSAGE ENGINE
// =====================================


function generateMessage(p){

    let intro = "";

    switch(reminderConfig.reminderType){

        case "T-7":

            intro = `Hi ${p.name}! 👋
Thank you for registering for *${reminderConfig.eventName}*.
We are delighted that you'll be joining us! Over the coming week, we encourage you to prepare your heart as we look forward to a meaningful time together.

`;

            break;

        case "T-3":

            intro = `Hi ${p.name}! 😊
Only *3 days to go* until *${reminderConfig.eventName}*!
Our team has been praying and preparing, and we're excited to welcome you. Here's a quick reminder of the event details.

`;

            break;

        case "T-1":

            intro = `Hi ${p.name}! 👋
Just a friendly reminder that *${reminderConfig.eventName}* is happening *tomorrow*!
We're looking forward to seeing you. Here are the final details before the event.

`;

            break;

    }

    return `${intro}

📅 *Date*
${reminderConfig.eventDate}

🕒 *Reporting Time*
${reminderConfig.reportingTime}

⏰ *Programme Starts*
${reminderConfig.eventTime}

📍 *Venue*
${reminderConfig.venue}

📌 *Location*
${reminderConfig.location}

${reminderConfig.importantInfo ? "ℹ️ *Important Information*\n" + reminderConfig.importantInfo + "\n\n" : ""}

If you have any questions or need assistance, feel free to let us know.

We pray that this gathering will be a meaningful and encouraging time for you, and we look forward to welcoming you soon.

Blessings,
*COOS Missions Team*`;

}




function previewMessage(index){


alert(

generateMessage(
participants[index]
)

);


}









// =====================================
// WHATSAPP
// =====================================


function sendWhatsApp(index){


openWhatsApp(
participants[index]
);


}







function openWhatsApp(p){


const phone =

String(p.mobile)
.replace(/\D/g,'');



const url =

"https://wa.me/"

+

phone

+

"?text="

+

encodeURIComponent(

generateMessage(p)

);



window.open(
url,
"_blank"
);


}









// =====================================
// SEND SELECTED
// =====================================


function sendSelectedWhatsApp(){



const selected =

document.querySelectorAll(
".personCheck:checked"
);




if(selected.length===0){


alert(
"Please select people first"
);


return;


}





selected.forEach(cb=>{


openWhatsApp(

participants[
cb.value
]

);


});



}









function goBack(){


window.location.href =
"event-management.html";


}








// =====================================
// START
// =====================================


window.onload =
async function(){


await loadReminderEvents();


};



</script>


</body>

</html>
