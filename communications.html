<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Communication Centre</title>

<script src="./js/config.js"></script>
<script src="./js/auth.js"></script>


<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f6f8;
}


.header{

    background:#1e3a8a;
    color:white;
    padding:20px;

    display:flex;
    justify-content:space-between;
    align-items:center;

}


.container{

    padding:25px;

}


.card{

    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;

}


button{

    padding:10px 15px;
    border:none;
    border-radius:6px;
    background:#1e3a8a;
    color:white;
    cursor:pointer;

}


button:hover{

    background:#163172;

}



select{

    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;

}



.eventCard{

    padding:15px;
    background:#eef2ff;
    border-radius:8px;
    margin-top:10px;

}



.person{

    border:1px solid #ddd;
    padding:15px;
    margin-top:10px;
    border-radius:8px;

}



.badge{

    background:#dbeafe;
    color:#1e3a8a;

    padding:5px 10px;
    border-radius:15px;

}



.whatsapp{

    background:#16a34a;

}



</style>


</head>



<body>



<div class="header">


<h2>
📢 Communication Centre
</h2>


<button onclick="goBack()">
Back
</button>


</div>





<div class="container">



<div class="card">


<h3>
Today's Reminder Events
</h3>


<div id="eventList">

Loading...

</div>


</div>






<div class="card">


<h3>
Select Event
</h3>


<select id="eventFilter"
onchange="loadParticipants()">


<option value="">
Select Event
</option>


</select>


</div>






<div class="card">


<h3>
Participants Requiring Reminder
</h3>


<div id="count">

0 people

</div>



<div id="participantList">

</div>



</div>



</div>






<script>


let reminderEvents=[];

let participants=[];




// ===============================
// API CALL
// ===============================

async function apiCall(action,data={}){


const response =
await fetch(

CONFIG.API_URL,

{

method:"POST",

headers:{

"Content-Type":"text/plain"

},

body:JSON.stringify({

action:action,

data:data

})

}

);



return await response.json();


}






// ===============================
// LOAD ACTIVE REMINDER EVENTS
// ===============================


async function loadReminderEvents(){


const result =
await apiCall(
"getActiveEventsForReminder",
{}
);



console.log(result);



if(!result){

document.getElementById(
"eventList"
).innerHTML =
"No reminders today";

return;

}



reminderEvents=result;



renderEvents();



populateEventDropdown();


}






// ===============================
// DISPLAY EVENTS
// ===============================


function renderEvents(){


const div =
document.getElementById(
"eventList"
);



div.innerHTML="";



if(reminderEvents.length===0){


div.innerHTML =
"No events requiring reminders";


return;


}




reminderEvents.forEach(e=>{


div.innerHTML +=

`

<div class="eventCard">


<b>
${e.eventName}
</b>


<br>


Date:
${e.eventDate}


<br>


Reminder:

<span class="badge">
${e.reminderType}
</span>



</div>


`;



});



}







// ===============================
// EVENT DROPDOWN
// ===============================


function populateEventDropdown(){


const select =
document.getElementById(
"eventFilter"
);



select.innerHTML =

`

<option value="">
Select Event
</option>

`;



reminderEvents.forEach(e=>{


select.innerHTML +=

`

<option value="${e.spreadsheetId}">

${e.eventName}
-
${e.reminderType}

</option>

`;


});



}







// ===============================
// LOAD PARTICIPANTS
// ===============================


async function loadParticipants(){


const eventId =
document.getElementById(
"eventFilter"
).value;



if(!eventId)
return;



const event =
reminderEvents.find(
e=>
e.spreadsheetId===eventId
);




const result =
await apiCall(

"getReminderParticipants",

{

spreadsheetId:eventId,

reminderType:
event.reminderType

}

);



console.log(result);



participants=result;



renderParticipants();



}







// ===============================
// DISPLAY PARTICIPANTS
// ===============================


function renderParticipants(){


const div =
document.getElementById(
"participantList"
);



div.innerHTML="";



document.getElementById(
"count"
)
.innerHTML =

participants.length
+
" people";





participants.forEach(p=>{


const message =

`Hi ${p.name},

This is a reminder for ${p.eventName}.

Date:
${p.eventDate}

We look forward to seeing you!

`;




div.innerHTML +=


`

<div class="person">


<h4>
${p.name}
</h4>



<p>
📱 ${p.mobile}
</p>


<p>

<span class="badge">

${p.reminderType}

</span>

</p>




<button

class="whatsapp"

onclick='openWhatsApp("${p.mobile}",${JSON.stringify(message)})'>

WhatsApp

</button>



</div>


`;



});



}







// ===============================
// WHATSAPP MANUAL SEND
// ===============================


function openWhatsApp(
mobile,
message
){


const url =

"https://wa.me/"
+
mobile
+
"?text="
+
encodeURIComponent(message);



window.open(
url,
"_blank"
);


}






function goBack(){


window.location.href =
"event-management.html";


}






// ===============================
// START
// ===============================


window.onload =
async function(){


await loadReminderEvents();


};



</script>



</body>

</html>
