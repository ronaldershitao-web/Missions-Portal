<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Communication Centre</title>

<script src="./js/config.js"></script>
<script src="./js/auth.js"></script>


<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f6f8;
}


.header{

    background:#1e3a8a;
    color:white;
    padding:20px;

    display:flex;
    justify-content:space-between;
    align-items:center;

}


.container{

    padding:25px;

}


.card{

    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;

}


button{

    padding:10px 15px;
    border:none;
    border-radius:6px;
    background:#1e3a8a;
    color:white;
    cursor:pointer;

}


button:hover{

    background:#163172;

}


select{

    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;

}



.eventCard{

    padding:15px;
    background:#eef2ff;
    border-radius:8px;
    margin-top:10px;

}



.person{

    border:1px solid #ddd;
    padding:15px;
    margin-top:10px;
    border-radius:8px;

}



.badge{

    background:#dbeafe;
    color:#1e3a8a;

    padding:5px 10px;
    border-radius:15px;

}



.whatsapp{

    background:#16a34a;

}

</style>

</head>



<body>



<div class="header">

<h2>
📢 Communication Centre
</h2>


<button onclick="goBack()">
Back
</button>


</div>





<div class="container">


<div class="card">

<h3>
Today's Reminder Events
</h3>


<div id="eventList">
Loading...
</div>


</div>





<div class="card">

<h3>
Select Event
</h3>


<select id="eventFilter"
onchange="loadParticipants()">


<option value="">
Select Event
</option>


</select>


</div>






<div class="card">


<h3>
Participants Requiring Reminder
</h3>


<div id="count">
0 people
</div>


<div id="participantList">

</div>


</div>


</div>








<script>


let reminderEvents=[];

let participants=[];



const params =
new URLSearchParams(
window.location.search
);


const presetEvent =
params.get("event");





// =====================================
// APPS SCRIPT EXECUTION API
// =====================================


async function apiCall(functionName, parameters=[]){


const response = await fetch(

`https://script.googleapis.com/v1/scripts/${CONFIG.SCRIPT_ID}:run`,

{

method:"POST",

headers:{

"Content-Type":"application/json",

"Authorization":
"Bearer " + await getAccessToken()

},


body:JSON.stringify({

function:functionName,

parameters:parameters,

devMode:false

})


}

);



const result =
await response.json();



console.log(
functionName,
result
);



if(result.error){

throw new Error(

result.error.details?.[0]?.errorMessage
||
result.error.message

);

}



return result.response.result;


}







// =====================================
// LOAD ACTIVE REMINDER EVENTS
// =====================================


async function loadReminderEvents(){


try{


const result =
await apiCall(
"getActiveEventsForReminder",
[]
);



console.log(result);



reminderEvents =
result || [];



renderEvents();

populateEventDropdown();



}
catch(err){


console.error(err);


document.getElementById(
"eventList"
).innerHTML =
"Unable to load reminders";


}

}







// =====================================
// DISPLAY EVENTS
// =====================================


function renderEvents(){


const div =
document.getElementById(
"eventList"
);



div.innerHTML="";



if(reminderEvents.length===0){


div.innerHTML =
"No events requiring reminders";


return;

}




reminderEvents.forEach(e=>{


div.innerHTML +=

`

<div class="eventCard">


<b>
${e.eventName}
</b>


<br>


Date:
${e.eventDate}


<br>


Reminder:

<span class="badge">
${e.reminderType}
</span>


</div>

`;



});



}







// =====================================
// DROPDOWN
// =====================================


function populateEventDropdown(){


const select =
document.getElementById(
"eventFilter"
);



select.innerHTML =

`
<option value="">
Select Event
</option>
`;



reminderEvents.forEach(e=>{


select.innerHTML +=

`

<option value="${e.spreadsheetId}">

${e.eventName}
-
${e.reminderType}

</option>

`;


});



if(presetEvent){

select.value =
presetEvent;

loadParticipants();

}


}








// =====================================
// LOAD PARTICIPANTS
// =====================================


async function loadParticipants(){


const eventId =
document.getElementById(
"eventFilter"
).value;



if(!eventId)
return;



const event =
reminderEvents.find(
e=>
String(e.spreadsheetId)
===
String(eventId)
);



try{


const result =
await apiCall(

"getReminderParticipants",

[

{

spreadsheetId:eventId,

reminderType:
event.reminderType

}

]

);



participants =
result || [];



renderParticipants();



}
catch(err){


console.error(err);


alert(
"Unable to load participants"
);


}


}







// =====================================
// DISPLAY PARTICIPANTS
// =====================================


function renderParticipants(){


const div =
document.getElementById(
"participantList"
);



div.innerHTML="";



document.getElementById(
"count"
)
.innerHTML =

participants.length
+
" people";





participants.forEach(p=>{


const message =

`Hi ${p.name},

This is a reminder for ${p.eventName}.

Date:
${p.eventDate}

We look forward to seeing you!

`;



div.innerHTML +=


`

<div class="person">


<h4>
${p.name}
</h4>


<p>
📱 ${p.mobile}
</p>


<span class="badge">

${p.reminderType}

</span>


<br><br>


<button

class="whatsapp"

onclick='openWhatsApp("${p.mobile}",${JSON.stringify(message)})'>

WhatsApp

</button>


</div>

`;



});



}







// =====================================
// WHATSAPP
// =====================================


function openWhatsApp(
mobile,
message
){


const url =

"https://wa.me/"
+
mobile
+
"?text="
+
encodeURIComponent(message);



window.open(
url,
"_blank"
);


}







function goBack(){

window.location.href =
"event-management.html";

}






window.onload =
async function(){


await loadReminderEvents();


};


</script>


</body>

</html>
