.loading{

display:none;

position:fixed;

left:0;
top:0;

width:100%;
height:100%;

justify-content:center;

<script>

const user =
JSON.parse(
localStorage.getItem("mp_user")
);

if(!user){

location="index.html";

}

if(
!["Admin","Intern"].includes(user.role)
){

alert("Access denied.");

location="dashboard.html";

}

    // =====================================
// Generic Apps Script Runner
// =====================================
async function runScript(functionName, parameters = []) {

    const response = await fetch(
        `https://script.googleapis.com/v1/scripts/${CONFIG.SCRIPT_ID}:run`,
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + await getAccessToken()
            },
            body: JSON.stringify({
                function: functionName,
                parameters: parameters,
                devMode: false
            })
        }
    );

    const result = await response.json();

    console.log(result);

    if (result.error) {
        throw new Error(result.error.details?.[0]?.errorMessage || result.error.message);
    }

    return result.response.result;

}


    // ==========================================
// EVENT MANAGEMENT UI
// ==========================================

let events = [];
let participants = [];
let currentEvent = null;

// Load page
window.onload = function () {
    loadEvents();

    document
        .getElementById("searchBox")
        .addEventListener("keyup", filterEvents);

    document
        .getElementById("statusFilter")
        .addEventListener("change", filterEvents);
};

// ==========================================
// Loading
// ==========================================

function showLoading() {
    document.getElementById("loading").style.display = "flex";
}

function hideLoading() {
    document.getElementById("loading").style.display = "none";
}

// ==========================================
// Load Events
// ==========================================

async function loadEvents() {

    showLoading();

    try {

        events = await fetchEvents();

        renderSummary();

        renderTable(events);

    }

    catch (err) {

        console.error(err);

        alert("Unable to load events.");

    }

    hideLoading();

}

// ==========================================
// Summary
// ==========================================

function renderSummary() {

    document.getElementById("totalEvents").innerText =
        events.length;

    document.getElementById("activeEvents").innerText =
        events.filter(e => e.status == "ACTIVE").length;

    document.getElementById("totalRegs").innerText =
        events.reduce((a, b) => a + Number(b.registrations), 0);

    document.getElementById("totalAttendance").innerText =
        events.reduce((a, b) => a + Number(b.attended), 0);

}

// ==========================================
// Event Table
// ==========================================

function renderTable(data) {

    const tbody = document.getElementById("eventTable");

    tbody.innerHTML = "";

    data.forEach(event => {

        const tr = document.createElement("tr");

        tr.innerHTML = `

        <td>${event.eventDate}</td>

        <td>${event.eventName}</td>

        <td>${event.eventType}</td>

        <td>

            <span class="badge ${event.status.toLowerCase()}">

                ${event.status}

            </span>

        </td>

        <td>${event.registrations}</td>

        <td>${event.attended}</td>

        <td>

            <button
                class="actionBtn manageBtn"
                onclick="viewParticipants('${event.spreadsheetId}')">

                Manage

            </button>

            <button
                class="actionBtn syncBtn"
                onclick="syncEvent('${event.spreadsheetId}')">

                Sync

            </button>

            ${
                event.status == "ACTIVE"

                ?

                `<button
                    class="actionBtn closeBtn"
                    onclick="closeEvent('${event.spreadsheetId}')">

                    Close

                </button>`

                :

                `<button
                    class="actionBtn openBtn"
                    onclick="reopenEvent('${event.spreadsheetId}')">

                    Open

                </button>`

            }

        </td>

        `;

        tbody.appendChild(tr);

    });

}

// ==========================================
// Search & Filter
// ==========================================

function filterEvents() {

    const keyword =
        document
            .getElementById("searchBox")
            .value
            .toLowerCase();

    const status =
        document
            .getElementById("statusFilter")
            .value;

    const filtered = events.filter(e => {

        const matchName =
            e.eventName
                .toLowerCase()
                .includes(keyword);

        const matchStatus =
            status == "ALL" ||
            e.status == status;

        return matchName && matchStatus;

    });

    renderTable(filtered);

}

// ==========================================
// View Participants
// ==========================================

async function viewParticipants(spreadsheetId) {

    showLoading();

    currentEvent = spreadsheetId;

    participants =
        await fetchParticipants(spreadsheetId);

    hideLoading();

    renderParticipants();

}

// ==========================================
// Participant Table
// ==========================================

function renderParticipants() {

    document
        .getElementById("participantModal")
        .style.display = "flex";
    document.getElementById("participantSearch").value = "";
document.getElementById("participantSearch").onkeyup = filterParticipants;

    const tbody =
        document.getElementById("participantTable");

    tbody.innerHTML = "";

    document.getElementById("regCount").innerText =
        participants.length;

    document.getElementById("attCount").innerText =
        participants.filter(
            p => p.attendance == "YES"
        ).length;

    document.getElementById("walkinCount").innerText =
participants.filter(
p => p.referral=="Walk In"
).length;

    participants.forEach((p, index) => {

        const tr = document.createElement("tr");

        tr.innerHTML = `

        <td>

            <input
type="checkbox"
class="attendance-check"
data-email="${p.email}"
${p.attendance=="YES" ? "checked" : ""}>
        </td>

        <td>${p.name}</td>

        <td>${p.email}</td>

        <td>${p.mobile}</td>

       <td>${p.church}</td>

<td>${p.referral}</td>

        `;

        tbody.appendChild(tr);

    });

}
    document
.getElementById("participantSearch")
.addEventListener("keyup",filterParticipants);

function filterParticipants() {

    const keyword = document
        .getElementById("participantSearch")
        .value
        .trim()
        .toLowerCase();

    const rows = document
        .getElementById("participantTable")
        .getElementsByTagName("tr");

    for (const row of rows) {

        row.style.display =
            row.innerText.toLowerCase().includes(keyword)
            ? ""
            : "none";

    }

}

// ==========================================
// Close Modal
// ==========================================

function closeModal() {

    document
        .getElementById("participantModal")
        .style.display = "none";

}

   
async function fetchEvents(){

    return await runScript("getEventList");

}

    async function fetchParticipants(id){

    return await runScript("getParticipants",[id]);

}

    async function syncEvent(id){

    showLoading();

    try{

        await runScript("syncEvent",[id]);

        await loadEvents();

    }

    finally{

        hideLoading();

    }

}

    async function closeEvent(id){

    if(!confirm("Close this event?")) return;

    await runScript("setEventStatus",[id,"CLOSED"]);

    loadEvents();

}

    async function reopenEvent(id){

    await runScript("setEventStatus",[id,"ACTIVE"]);

    loadEvents();

}

    async function saveAttendance() {

    const checked = document.querySelectorAll(".attendance-check");

    const attendance = [];

    checked.forEach(box => {

        attendance.push({

            email: box.dataset.email,
            attended: box.checked

        });

    });

    try {

        showLoading();

        await runScript(
    "saveAttendance",
    [
        currentEvent,
        attendance
    ]
);

        hideLoading();

        alert("Attendance saved successfully.");

        await loadEvents();

    } catch(err) {

        hideLoading();

        console.error(err);

        alert("Unable to save attendance.");

    }

}

    function openWalkInForm(){

window.location.href=
`walkin.html?event=${currentEvent}`;

}


</script>
