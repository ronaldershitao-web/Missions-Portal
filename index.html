<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Missions Portal</title>

<meta name="theme-color" content="#1e3a8a">
<meta name="description" content="Missions Portal">

<!-- FIX: Required for Google Identity popup flow -->
<meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="css/style.css">

<!-- ==============================
     GOOGLE IDENTITY SERVICES
================================== -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<!-- ==============================
     GOOGLE API CLIENT (Execution API)
================================== -->
<script src="https://apis.google.com/js/api.js"></script>

</head>

<body>

<div class="background-overlay"></div>

<div class="container-fluid vh-100">

    <div class="row h-100">

        <!-- LEFT PANEL -->
        <div class="col-lg-7 d-none d-lg-flex align-items-center justify-content-center">

            <div class="hero">

                <div class="logo-circle">🌍</div>

                <h1 class="portal-title">Missions Portal</h1>

                <p class="portal-subtitle">
                    Connecting People.<br>
                    Empowering Missions.
                </p>

                <div class="hero-features">

                    <div><i class="bi bi-people-fill"></i> Volunteer Management</div>
                    <div><i class="bi bi-person-check-fill"></i> Participant Management</div>
                    <div><i class="bi bi-whatsapp"></i> Communications</div>
                    <div><i class="bi bi-file-earmark-spreadsheet-fill"></i> Data Migration</div>

                </div>

            </div>

        </div>

        <!-- RIGHT PANEL -->
        <div class="col-lg-5 col-12 d-flex align-items-center justify-content-center">

            <div class="login-card shadow">

                <div class="text-center">

                    <div class="mobile-logo d-lg-none">🌍</div>

                    <h2>Welcome</h2>

                    <p class="text-muted">
                        Sign in using your Google Account
                    </p>

                </div>

                <!-- GOOGLE LOGIN -->
                <div class="mt-4">

                    <div id="g_id_onload"
                         data-client_id="263902111764-jdil2ttim5q05gim8tsheopgoprr6jmh.apps.googleusercontent.co"
                         data-context="signin"
                         data-callback="handleCredentialResponse"
                         data-auto_prompt="false">
                    </div>

                    <div class="g_id_signin"
                         data-type="standard"
                         data-theme="filled_blue"
                         data-size="large"
                         data-shape="pill"
                         data-text="signin_with"
                         data-logo_alignment="left"
                         data-width="350">
                    </div>

                </div>

                <!-- LOADING -->
                <div class="loading-area mt-4 d-none" id="loadingArea">

                    <div class="spinner-border text-primary"></div>

                    <div class="mt-3">
                        Signing in...
                    </div>

                </div>

                <!-- MESSAGE -->
                <div id="message" class="mt-4"></div>

                <hr>

                <div class="footer">

                    Version 1.0.0<br>
                    © 2026 Church of Our Saviour

                </div>

            </div>

        </div>

    </div>

</div>

<!-- ==============================
     SCRIPTS (ORDER MATTERS)
================================== -->

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<!-- CORE -->
<script src="js/config.js"></script>
<script src="js/app.js"></script>

<!-- AUTH LAST -->
<script src="js/auth.js"></script>

</body>
</html>
